<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="塔羅學習">
<title>塔羅牌學習系統</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#fdf3e3;
  --gold:#c8873a;
  --gold-light:#e8b06a;
  --warm:#8b3a2a;
  --rose:#c2637a;
  --midnight:#1a0f08;
  --surface:#2a1508;
  --surface2:#3a1e0c;
  --border:rgba(200,135,58,0.35)
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--midnight);color:var(--parchment);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding-bottom:calc(88px + env(safe-area-inset-bottom));font-size:16px;line-height:1.65}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 20% 0%,rgba(180,80,20,.2) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(140,50,10,.15) 0%,transparent 50%),
  radial-gradient(1px 1px at 15% 20%,rgba(255,220,150,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 70% 10%,rgba(255,200,100,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 45% 60%,rgba(255,180,80,.2) 0%,transparent 100%),
  radial-gradient(1px 1px at 85% 40%,rgba(255,220,150,.3) 0%,transparent 100%),
  var(--midnight);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:640px;margin:0 auto}
header{text-align:center;padding:24px 16px 16px;border-bottom:1px solid var(--border)}
.logo-symbol{font-size:1.8rem;margin-bottom:4px;display:block;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(.85rem,3.2vw,1.15rem);color:var(--gold-light);letter-spacing:.07em;line-height:1.3}
.subtitle{font-size:.68rem;color:rgba(253,243,227,.3);margin-top:3px;letter-spacing:.07em;font-style:italic}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(26,15,8,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:6px 0 calc(6px + env(safe-area-inset-bottom));display:flex}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;background:none;border:none;color:rgba(253,243,227,.3);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.6rem;letter-spacing:.02em;transition:all .2s;-webkit-appearance:none}
.nav-item .nav-icon{font-size:1.25rem;line-height:1}
.nav-item.active{color:var(--gold-light)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 5px rgba(200,135,58,.5))}
.panel{display:none;padding:14px 13px}
.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-box{background:linear-gradient(145deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:14px;padding:18px 16px;margin-bottom:14px;box-shadow:0 6px 24px rgba(0,0,0,.4)}
.card-box h2{font-family:'Cinzel Decorative',serif;font-size:.75rem;color:var(--gold-light);letter-spacing:.1em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-box h2::after{content:'';flex:1;height:1px;background:var(--border)}
label{display:block;font-size:.78rem;color:var(--gold-light);letter-spacing:.06em;margin-bottom:5px;margin-top:13px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;background:rgba(0,0,0,.32);border:1px solid rgba(200,135,58,.2);border-radius:10px;color:var(--parchment);font-family:'Noto Serif TC',serif;font-size:.95rem;padding:11px 13px;transition:border-color .25s;outline:none;-webkit-appearance:none;-webkit-overflow-scrolling:touch}
input:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,135,58,.1)}
textarea{resize:none;line-height:1.7;overflow-y:auto;-webkit-overflow-scrolling:touch;display:block}
.ta-sm{height:75px}.ta-md{height:110px}.ta-lg{height:150px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border:none;border-radius:12px;font-family:'Noto Serif TC',serif;font-size:.9rem;cursor:pointer;transition:all .2s;letter-spacing:.04em;width:100%;-webkit-appearance:none}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,#7a4010,var(--gold));color:#fdf3e3;font-weight:700;box-shadow:0 4px 14px rgba(200,135,58,.3);margin-top:14px}
.btn-sm{width:auto;padding:9px 15px;font-size:.82rem;margin-top:0}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--gold-light)}
.btn-danger{background:rgba(194,99,122,.13);border:1px solid rgba(194,99,122,.27);color:#e09090}
.ori-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.ori-btn{padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:rgba(253,243,227,.4);font-family:'Noto Serif TC',serif;font-size:.9rem;cursor:pointer;transition:all .2s;-webkit-appearance:none}
.ori-btn.selected{border-color:var(--gold-light);background:rgba(200,135,58,.12);color:var(--gold-light)}
.picker-toggle{background:rgba(0,0,0,.2);border:1px dashed var(--border);border-radius:10px;padding:9px 13px;cursor:pointer;color:rgba(253,243,227,.38);font-size:.8rem;text-align:center;margin-top:8px;display:block;width:100%;font-family:'Noto Serif TC',serif;-webkit-appearance:none}
.card-picker{display:none;margin-top:8px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:12px;padding:12px;max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card-picker.open{display:block;animation:fadeIn .2s ease}
.picker-section-title{font-size:.68rem;color:var(--gold);letter-spacing:.1em;margin-bottom:6px;margin-top:10px;padding-bottom:3px;border-bottom:1px solid rgba(200,135,58,.18)}
.picker-section-title:first-child{margin-top:0}
.card-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:3px}
.card-chip{background:rgba(139,58,42,.15);border:1px solid rgba(139,58,42,.28);border-radius:16px;padding:4px 10px;font-size:.72rem;color:rgba(253,243,227,.58);cursor:pointer;transition:all .16s}
.card-chip.selected{background:rgba(200,135,58,.28);border-color:var(--gold);color:var(--parchment)}

/* 今日運勢卡片 */
.fortune-card{background:linear-gradient(145deg,#4a1e08,#3a1208);border:1px solid rgba(200,135,58,.5);border-radius:14px;padding:18px 16px;margin-bottom:14px;display:none}
.fortune-card.visible{display:block;animation:fadeIn .4s ease}
.fortune-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fortune-card-name{font-family:‘Cinzel Decorative’,serif;font-size:.9rem;color:var(–gold-light)}
.fortune-ori{font-size:.72rem;padding:3px 9px;border-radius:12px;background:rgba(200,135,58,.18);border:1px solid var(–border);color:var(–gold-light)}
.fortune-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(200,135,58,.12)}
.fortune-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.fortune-label{font-size:.7rem;color:var(–gold-light);letter-spacing:.08em;margin-bottom:5px}
.fortune-text{font-size:.92rem;color:rgba(253,243,227,.82);line-height:1.8}
.fortune-mantra{text-align:center;font-style:italic;color:var(–gold-light);font-size:.95rem;line-height:1.7;padding:12px;background:rgba(200,135,58,.08);border-radius:10px;border:1px solid rgba(200,135,58,.18)}

/* 筆記卡片 */
.note-card{background:linear-gradient(145deg,var(–surface2),var(–surface));border:1px solid var(–border);border-radius:13px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.note-card:active{transform:scale(.98);border-color:var(–gold)}
.note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.note-name{font-family:‘Cinzel Decorative’,serif;font-size:.8rem;color:var(–gold-light)}
.note-date{font-size:.67rem;color:rgba(253,243,227,.26)}
.note-kws{display:flex;flex-wrap:wrap;gap:5px}
.kw-pill{background:rgba(200,135,58,.14);border:1px solid rgba(200,135,58,.26);border-radius:14px;padding:3px 9px;font-size:.68rem;color:rgba(253,243,227,.65)}
.kw-pill.neg{background:rgba(194,99,122,.1);border-color:rgba(194,99,122,.22);color:rgba(253,243,227,.6)}
.empty-state{text-align:center;padding:48px 20px;color:rgba(253,243,227,.2);font-style:italic;font-size:.85rem;line-height:1.8}
.empty-icon{font-size:2.2rem;margin-bottom:10px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none}
.section-label{font-size:.72rem;color:var(–gold-light);letter-spacing:.08em;margin-bottom:8px;padding:0 2px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.stat-box{background:linear-gradient(145deg,var(–surface2),var(–surface));border:1px solid var(–border);border-radius:13px;padding:13px 7px;text-align:center}
.stat-num{font-family:‘Cinzel Decorative’,serif;font-size:1.5rem;color:var(–gold-light)}
.stat-label{font-size:.63rem;color:rgba(253,243,227,.3);margin-top:3px;letter-spacing:.05em}
.prog-wrap{margin-bottom:12px}
.prog-label-row{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(253,243,227,.34);margin-bottom:5px}
.prog-bar-bg{background:rgba(0,0,0,.3);border-radius:20px;height:7px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(–warm),var(–gold));transition:width .7s ease}
.backup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.backup-card{background:rgba(0,0,0,.18);border:1px solid var(–border);border-radius:13px;padding:15px 12px;text-align:center}
.backup-icon{font-size:1.6rem;margin-bottom:5px}
.backup-title{font-size:.8rem;color:var(–gold-light);margin-bottom:3px}
.backup-desc{font-size:.7rem;color:rgba(253,243,227,.28);line-height:1.55;margin-bottom:10px}
.status-pill{font-size:.68rem;padding:4px 10px;border-radius:16px;display:inline-block}
.status-ok{background:rgba(74,124,107,.16);color:#7ec8a0;border:1px solid rgba(74,124,107,.26)}
.status-warn{background:rgba(200,135,58,.1);color:var(–gold-light);border:1px solid rgba(200,135,58,.2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex;animation:fadeIn .22s ease}
.modal{background:linear-gradient(165deg,var(–surface2),var(–midnight));border:1px solid var(–gold);border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:rgba(200,135,58,.28);border-radius:2px;margin:0 auto 16px}
.modal-close-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal h2{font-family:‘Cinzel Decorative’,serif;color:var(–gold-light);font-size:.85rem}
.modal-close{background:none;border:none;color:rgba(253,243,227,.36);font-size:1.2rem;cursor:pointer;padding:4px;width:auto}
.m-section{margin-bottom:11px}
.m-label{font-size:.7rem;color:var(–gold-light);letter-spacing:.08em;margin-bottom:4px}
.m-value{font-size:.9rem;color:rgba(253,243,227,.76);line-height:1.75}
.m-kws{display:flex;flex-wrap:wrap;gap:5px}
.m-divider{height:1px;background:var(–border);margin:11px 0}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(–warm),#a03020);color:var(–parchment);padding:10px 22px;border-radius:24px;font-size:.82rem;box-shadow:0 5px 18px rgba(0,0,0,.5);z-index:300;opacity:0;transition:all .27s;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}
@media(max-width:380px){.backup-grid{grid-template-columns:1fr}}
</style>

</head>
<body>
<div class="app">
<header>
  <span class="logo-symbol">🔮</span>
  <h1>塔羅牌學習系統</h1>
  <div class="subtitle">Tarot Wisdom · Daily Oracle · Knowledge Archive</div>
</header>

<!-- 每日占卜 -->

<div id="panel-daily" class="panel active">
  <div class="card-box">
    <h2>🌙 今日占卜</h2>
    <label>今天抽到的牌</label>
    <input type="text" id="daily-card" placeholder="例：星星、太陽、聖杯三…" oninput="onCardInput()">
    <button class="picker-toggle" onclick="togglePicker('picker1','daily-card',null)">📋 從 78 張牌表選牌 ▾</button>
    <div id="picker1" class="card-picker"></div>
    <label>牌面方向</label>
    <div class="ori-toggle">
      <button class="ori-btn selected" id="ori-pos" onclick="selectOri('正位')">▲ 正位</button>
      <button class="ori-btn" id="ori-neg" onclick="selectOri('逆位')">▽ 逆位</button>
    </div>
    <button class="btn btn-outline" style="margin-top:12px" onclick="generateFortune()">✨ 產生今日運勢</button>
  </div>

  <div class="fortune-card" id="fortune-display"></div>

  <div class="card-box" id="record-form" style="display:none">
    <h2>📝 今日紀錄</h2>
    <label>今天發生了什麼？</label>
    <textarea class="ta-lg" id="daily-event" placeholder="用幾句話描述今天的狀況、心情、遇到的事…"></textarea>
    <button class="btn btn-gold" onclick="saveDailyRecord()">💾 儲存今日占卜紀錄</button>
    <button class="btn btn-outline" style="margin-top:10px" onclick="clearDailyForm()">🗑 清除</button>
  </div>
</div>

<!-- 牌義庫 -->

<div id="panel-cards" class="panel">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="card-search" placeholder="搜尋牌名或關鍵詞…" oninput="renderCardLibrary()">
  </div>
  <div id="card-library-list"></div>
</div>

<!-- 占卜紀錄 -->

<div id="panel-records" class="panel">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="record-search" placeholder="搜尋牌名或事件…" oninput="renderRecords()">
  </div>
  <div id="records-list"></div>
</div>

<!-- 進度 -->

<div id="panel-progress" class="panel">
  <div id="progress-content"></div>
</div>

<!-- 備份 -->

<div id="panel-backup" class="panel">
  <div class="card-box">
    <h2>💾 備份管理</h2>
    <div class="backup-grid">
      <div class="backup-card">
        <div class="backup-icon">📤</div>
        <div class="backup-title">匯出備份</div>
        <div class="backup-desc">下載 JSON 到裝置永久保存</div>
        <button class="btn btn-gold btn-sm" onclick="exportData()">下載備份</button>
      </div>
      <div class="backup-card">
        <div class="backup-icon">📥</div>
        <div class="backup-title">匯入備份</div>
        <div class="backup-desc">從 JSON 備份恢復紀錄</div>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">選擇檔案</button>
      </div>
    </div>
    <div id="backup-status-area"></div>
    <div style="margin-top:14px;background:rgba(194,99,122,.06);border:1px solid rgba(194,99,122,.18);border-radius:12px;padding:15px">
      <div style="font-size:.76rem;color:rgba(253,243,227,.34);margin-bottom:10px;line-height:1.65">⚠️ 清除所有占卜紀錄，不可復原</div>
      <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 清除全部資料</button>
    </div>
  </div>
</div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('daily')"><span class="nav-icon">🌙</span>每日占卜</button>
  <button class="nav-item" onclick="switchTab('cards')"><span class="nav-icon">🃏</span>牌義庫</button>
  <button class="nav-item" onclick="switchTab('records')"><span class="nav-icon">📜</span>占卜紀錄</button>
  <button class="nav-item" onclick="switchTab('progress')"><span class="nav-icon">📊</span>進度</button>
  <button class="nav-item" onclick="switchTab('backup')"><span class="nav-icon">💾</span>備份</button>
</nav>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"><div class="modal-handle"></div></div>
</div>
<div id="toast" class="toast"></div>

<script>
const TAROT_78={'大阿爾克那':['愚者(0)','魔術師(1)','女祭司(2)','女皇(3)','皇帝(4)','教皇(5)','戀人(6)','戰車(7)','力量(8)','隱士(9)','命運之輪(10)','正義(11)','吊人(12)','死神(13)','節制(14)','惡魔(15)','塔(16)','星星(17)','月亮(18)','太陽(19)','審判(20)','世界(21)'],'聖杯':['聖杯王牌','聖杯二','聖杯三','聖杯四','聖杯五','聖杯六','聖杯七','聖杯八','聖杯九','聖杯十','聖杯侍者','聖杯騎士','聖杯皇后','聖杯國王'],'權杖':['權杖王牌','權杖二','權杖三','權杖四','權杖五','權杖六','權杖七','權杖八','權杖九','權杖十','權杖侍者','權杖騎士','權杖皇后','權杖國王'],'寶劍':['寶劍王牌','寶劍二','寶劍三','寶劍四','寶劍五','寶劍六','寶劍七','寶劍八','寶劍九','寶劍十','寶劍侍者','寶劍騎士','寶劍皇后','寶劍國王'],'星幣':['星幣王牌','星幣二','星幣三','星幣四','星幣五','星幣六','星幣七','星幣八','星幣九','星幣十','星幣侍者','星幣騎士','星幣皇后','星幣國王']};

// ===== 牌義資料庫 =====
const CARD_DATA={

let selectedOri='正位';
let currentFortune=null;

function onCardInput(){const fc=document.getElementById('fortune-display');fc.classList.remove('visible');fc.innerHTML='';document.getElementById('record-form').style.display='none';}

function generateFortune(){
  const cardName=document.getElementById('daily-card').value.trim();
  if(!cardName){toast('請先輸入或選擇今天抽到的牌');return}
  const data=CARD_DATA[cardName];
  if(!data){toast('這張牌的運勢資料尚未建立，請直接填寫紀錄');document.getElementById('record-form').style.display='block';return}
  const f=selectedOri==='正位'?data.fortune.pos:data.fortune.neg;
  currentFortune=f;
  const fc=document.getElementById('fortune-display');
  fc.innerHTML=`
    <div class="fortune-header">
      <span class="fortune-card-name">《${cardName}》</span>
      <span class="fortune-ori">${selectedOri}</span>
    </div>
    <div class="fortune-section">
      <div class="fortune-label">⚡ 今日能量</div>
      <div class="fortune-text">${f.energy}</div>
    </div>
    <div class="fortune-section">
      <div class="fortune-label">⚠️ 今日注意</div>
      <div class="fortune-text">${f.note}</div>
    </div>
    <div class="fortune-section" style="border:none;padding-bottom:0;margin-bottom:0">
      <div class="fortune-label">🌿 療癒金句</div>
      <div class="fortune-mantra">${f.mantra}</div>
    </div>
  `;
  fc.classList.add('visible');
  document.getElementById('record-form').style.display='block';
}

// 每日占卜儲存
const KEYS={daily:'tarot_daily_v3',time:'tarot_backup_time',init:'tarot_init_v17'};
let dailyRecords=[];

function save(key,data){const s=JSON.stringify(data);try{localStorage.setItem(key,s)}catch(e){}try{sessionStorage.setItem(key,s)}catch(e){}}
function load(key){try{const d=localStorage.getItem(key);if(d)return JSON.parse(d)}catch(e){}try{const d=sessionStorage.getItem(key);if(d)return JSON.parse(d)}catch(e){}return null}
function saveRecords(){save(KEYS.daily,dailyRecords);save(KEYS.time,new Date().toISOString())}

function loadData(){
  const initialized=load(KEYS.init);
  if(!initialized){
    dailyRecords=PRELOAD_DAILY;
    save(KEYS.daily,dailyRecords);save(KEYS.init,true);save(KEYS.time,new Date().toISOString());
  }else{dailyRecords=load(KEYS.daily)||[]}
}

function saveDailyRecord(){
  const card=document.getElementById('daily-card').value.trim();
  const ev=document.getElementById('daily-event').value.trim();
  if(!card){toast('請輸入牌名');return}
  if(!ev){toast('請描述今天發生的事');return}
  const data=CARD_DATA[card];
  const f=currentFortune||(data?(selectedOri==='正位'?data.fortune.pos:data.fortune.neg):null);
  const record={id:Date.now(),card,ori:selectedOri,event:ev,energy:f?f.energy:'',note:f?f.note:'',mantra:f?f.mantra:'',date:new Date().toLocaleDateString('zh-TW'),time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})};
  dailyRecords.unshift(record);if(dailyRecords.length>90)dailyRecords=dailyRecords.slice(0,90);
  saveRecords();toast('占卜紀錄已儲存 ✓');
}

function clearDailyForm(){
  document.getElementById('daily-card').value='';document.getElementById('daily-event').value='';
  const fc=document.getElementById('fortune-display');fc.classList.remove('visible');fc.innerHTML='';
  document.getElementById('record-form').style.display='none';
  selectedOri='正位';document.getElementById('ori-pos').classList.add('selected');document.getElementById('ori-neg').classList.remove('selected');
  currentFortune=null;toast('表單已清除');
}

// 牌義庫
function renderCardLibrary(){
  const el=document.getElementById('card-library-list');
  const q=(document.getElementById('card-search')?.value||'').toLowerCase();
  const cards=Object.entries(CARD_DATA).filter(([name,d])=>name.toLowerCase().includes(q)||(d.posKw||'').toLowerCase().includes(q)||(d.negKw||'').toLowerCase().includes(q));
  if(!cards.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🌑</div>找不到符合的牌</div>`;return}
  el.innerHTML=cards.map(([name,d])=>`<div class="note-card" onclick="openCardDetail('${name}')"><div class="note-header"><span class="note-name">《${name}》<span style="font-size:.68rem;color:rgba(253,243,227,.38);font-family:'Noto Serif TC',serif"> ${d.num}</span></span></div><div class="note-kws">${(d.posKw||'').split('・').filter(Boolean).map(k=>`<span class="kw-pill">${k.trim()}</span>`).join('')}${(d.negKw||'').split('・').filter(Boolean).map(k=>`<span class="kw-pill neg">${k.trim()}</span>`).join('')}</div></div>`).join('');
}

// 占卜紀錄
function renderRecords(){
  const el=document.getElementById('records-list');
  const q=(document.getElementById('record-search')?.value||'').toLowerCase();
  const filtered=dailyRecords.filter(d=>d.card.toLowerCase().includes(q)||(d.event||'').toLowerCase().includes(q));
  if(!filtered.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🌙</div>${q?'找不到符合的紀錄':'尚未建立任何占卜紀錄'}</div>`;return}
  el.innerHTML=filtered.map(d=>`<div class="note-card" onclick="openRecord(${dailyRecords.indexOf(d)})"><div class="note-header"><span class="note-name">《${d.card}》${d.ori}</span><span class="note-date">${d.date}</span></div><div style="font-size:.78rem;color:rgba(253,243,227,.42);margin-top:5px;line-height:1.5">${d.event.length>55?d.event.slice(0,55)+'…':d.event}</div>${d.mantra?`<div style="font-size:.74rem;color:var(--gold-light);font-style:italic;margin-top:6px">${d.mantra}</div>`:''}</div>`).join('');
}

function openRecord(i){
  const d=dailyRecords[i];
  document.getElementById('modal-content').innerHTML=`<div class="modal-handle"></div><div class="modal-close-row"><h2>《${d.card}》${d.ori} · ${d.date}</h2><button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button></div><div class="m-section"><div class="m-label">📝 今日事件</div><div class="m-value">${d.event}</div></div>${d.energy||d.note||d.mantra?'<div class="m-divider"></div>':''}${d.energy?`<div class="m-section"><div class="m-label">⚡ 今日能量</div><div class="m-value">${d.energy}</div></div>`:''}${d.note?`<div class="m-section"><div class="m-label">⚠️ 今日注意</div><div class="m-value">${d.note}</div></div>`:''}${d.mapping?`<div class="m-section"><div class="m-label">🪞 生活映射</div><div class="m-value">${d.mapping.replace(/\n/g,'<br>')}</div></div>`:''}${d.hidden?`<div class="m-section"><div class="m-label">🌊 深層訊息</div><div class="m-value" style="font-style:italic">${d.hidden}</div></div>`:''}${d.action?`<div class="m-section"><div class="m-label">🎯 今日建議</div><div class="m-value">${d.action}</div></div>`:''}${d.mantra?`<div class="m-section" style="text-align:center"><div class="m-label">🌿 療癒金句</div><div class="m-value" style="color:var(--gold-light);font-style:italic">${d.mantra}</div></div>`:''}<div style="margin-top:16px"><button class="btn btn-danger btn-sm" onclick="deleteRecord(${i})">🗑 刪除紀錄</button></div>`;

function deleteRecord(i){if(!confirm('確定刪除這筆占卜紀錄？'))return;dailyRecords.splice(i,1);saveRecords();document.getElementById('modal-overlay').classList.remove('open');renderRecords();toast('已刪除')}

function exportData(){if(!dailyRecords.length){toast('目前沒有資料可匯出');return}const blob=new Blob([JSON.stringify({version:4,exported:new Date().toISOString(),dailyRecords},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`塔羅占卜備份_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.json`;a.click();toast('備份已下載 ✓')}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);const iD=data.dailyRecords||[];if(!iD.length){toast('找不到有效資料');return}if(!confirm(`即將匯入 ${iD.length} 筆紀錄，確定嗎？`))return;let added=0;iD.forEach(d=>{if(!dailyRecords.find(x=>x.id===d.id)){dailyRecords.push(d);added++}});saveRecords();renderBackupStatus();toast(`成功匯入 ${added} 筆紀錄 ✓`)}catch(e){toast('檔案格式錯誤')}};reader.readAsText(file);event.target.value=''}
function clearAll(){if(!confirm('確定清除所有資料？不可復原！'))return;dailyRecords=[];saveRecords();save(KEYS.init,true);renderBackupStatus();toast('所有資料已清除')}

const TABS=['daily','cards','records','progress','backup'];
function switchTab(tab){TABS.forEach((t,i)=>document.querySelectorAll('.nav-item')[i].classList.toggle('active',t===tab));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+tab).classList.add('active');if(tab==='cards')renderCardLibrary();if(tab==='records')renderRecords();if(tab==='progress')renderProgress();if(tab==='backup')renderBackupStatus();window.scrollTo({top:0,behavior:'smooth'})}
function buildPicker(id){const c=document.getElementById(id);let html='';for(const[suit,cards]of Object.entries(TAROT_78)){html+=`<div class="picker-section-title">${suit}</div><div class="card-chips">`;html+=cards.map(card=>`<span class="card-chip" onclick="pickCard(event,'${card}','${id}')">${card}</span>`).join('');html+='</div>'}c.innerHTML=html}
function togglePicker(pickerId,inputId,numInputId){const p=document.getElementById(pickerId);if(!p.innerHTML)buildPicker(pickerId);p._inputId=inputId;p.classList.toggle('open')}
function pickCard(e,card,pickerId){const p=document.getElementById(pickerId);const clean=card.replace(/\(\d+\)/,'').trim();document.getElementById(p._inputId).value=clean;p.querySelectorAll('.card-chip').forEach(c=>c.classList.remove('selected'));e.target.classList.add('selected');setTimeout(()=>p.classList.remove('open'),280);onCardInput()}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open')}
