<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>錢錢顯化庫 🐼</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #f5f5f0; font-family: -apple-system, 'Noto Sans TC', sans-serif; color: #2c2c2c; min-height: 100vh; padding-bottom: 90px; }

  /* Header */
  .header { background: #fff; padding: 28px 24px 20px; border-bottom: 1px solid #f0ede8; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  .header p  { font-size: 10px; font-weight: 700; color: #f59e0b; letter-spacing: 3px; margin-top: 3px; }

  /* Nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); border-top: 1px solid #f0ede8; display: flex; justify-content: space-around; align-items: center; padding: 12px 32px 20px; z-index: 100; }
  .nav-btn { background: none; border: none; color: #ccc; cursor: pointer; padding: 8px; border-radius: 12px; transition: color .2s; display: flex; align-items: center; justify-content: center; }
  .nav-btn.active { color: #f59e0b; }
  .nav-add { background: #f59e0b; border: none; color: #fff; width: 52px; height: 52px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(245,158,11,.35); font-size: 28px; font-weight: 300; line-height: 1; transition: background .2s; }
  .nav-add:hover { background: #f0a500; }

  /* Pages */
  .page { display: none; padding: 20px 16px; }
  .page.active { display: block; }

  /* Card */
  .card { background: #fff; border-radius: 28px; padding: 20px; border: 1px solid #f0ede8; margin-bottom: 16px; }

  /* Form elements */
  input[type=date], select, textarea {
    width: 100%; border: 1px solid #e8e4de; border-radius: 14px;
    padding: 12px 14px; font-size: 13px; font-family: inherit;
    background: #f9f8f5; color: #2c2c2c; appearance: none; outline: none;
  }
  input[type=date]:focus, select:focus, textarea:focus { border-color: #f59e0b; }
  textarea { resize: none; min-height: 110px; line-height: 1.6; }

  .label { font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
  .label.amber { color: #f59e0b; }
  .label.indigo { color: #6366f1; }
  .sublabel { font-size: 9px; color: #aaa; margin-bottom: 5px; display: block; }

  .row { display: flex; gap: 12px; }
  .col { flex: 1; min-width: 0; }

  /* Energy card */
  .energy-card { background: linear-gradient(135deg, #fffbeb, #fff7ed); border: 2px dashed #fcd34d; border-radius: 24px; padding: 16px; margin: 4px 0; }
  .energy-title { font-size: 10px; font-weight: 900; color: #d97706; letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .energy-row { font-size: 12px; font-weight: 700; color: #3c3c3c; margin-bottom: 6px; }
  .energy-row span.amber { color: #b45309; }
  .energy-row span.indigo { color: #4f46e5; }
  .energy-meta { font-size: 10px; color: #aaa; margin-top: 4px; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; }
  .btn-save { background: #f59e0b; color: #fff; border: none; border-radius: 14px; padding: 14px 18px; cursor: pointer; font-size: 18px; transition: background .2s; }
  .btn-save:hover { background: #f0a500; }
  .btn-note { flex: 1; background: #1c1c1e; color: #fff; border: none; border-radius: 14px; padding: 14px; font-size: 13px; font-weight: 900; cursor: pointer; letter-spacing: 1px; transition: background .2s; }
  .btn-note:hover { background: #333; }

  /* Analysis */
  .analysis-card { background: #1e1b4b; border-radius: 28px; padding: 24px; color: #fff; }
  .analysis-title { font-size: 10px; font-weight: 900; color: #fbbf24; letter-spacing: 2px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .analysis-text { font-size: 12px; line-height: 1.8; color: #c7d2fe; white-space: pre-wrap; }
  .analysis-empty { font-size: 12px; color: #6366f1; opacity: .6; font-style: italic; }

  /* Calendar */
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .cal-header h2 { font-size: 16px; font-weight: 900; }
  .cal-nav { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 10px; font-size: 18px; color: #555; }
  .cal-nav:hover { background: #f5f5f0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { font-size: 10px; font-weight: 900; color: #ccc; text-align: center; padding: 4px 0; }
  .cal-day { aspect-ratio: 1; border-radius: 10px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; color: #bbb; background: #f9f8f5; position: relative; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .cal-day:hover { background: #f0ede8; }
  .cal-day.has-record { background: #f59e0b; color: #fff; box-shadow: 0 2px 8px rgba(245,158,11,.3); }
  .cal-day.has-record:hover { background: #f0a500; }
  .cal-day.today-mark { outline: 2px solid #f59e0b; }
  .cal-dot { position: absolute; top: 3px; right: 3px; width: 5px; height: 5px; background: #a5b4fc; border-radius: 50%; }
  .cal-empty { background: transparent !important; cursor: default !important; }

  /* Stats */
  .stats-card { background: #1c1c1e; border-radius: 24px; padding: 20px; color: #fff; }
  .stats-title { font-size: 10px; font-weight: 900; color: #f59e0b; letter-spacing: 2px; margin-bottom: 14px; }
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .stat-name { font-size: 11px; font-weight: 900; width: 56px; flex-shrink: 0; }
  .stat-bar-wrap { flex: 1; height: 6px; background: #333; border-radius: 99px; overflow: hidden; }
  .stat-bar { height: 100%; background: #f59e0b; border-radius: 99px; }
  .stat-count { font-size: 11px; font-weight: 700; color: #f59e0b; width: 20px; text-align: right; }
  .stats-meta { font-size: 10px; color: #555; margin-top: 10px; }

  /* Library */
  .lib-banner { background: #fffbeb; border: 1px solid #fde68a; border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; }
  .lib-banner p:first-child { font-size: 11px; font-weight: 900; color: #b45309; }
  .lib-banner p:last-child  { font-size: 10px; color: #d97706; margin-top: 3px; }
  .lib-card { background: #fff; border-radius: 24px; padding: 18px; border: 1px solid #f0ede8; margin-bottom: 10px; }
  .lib-id { font-size: 9px; font-weight: 900; color: #f59e0b; letter-spacing: 2px; }
  .lib-name { font-size: 18px; font-weight: 900; margin: 3px 0 10px; }
  .lib-badge { font-size: 10px; background: #f9f8f5; padding: 4px 10px; border-radius: 99px; color: #777; font-weight: 700; }
  .lib-element { font-size: 10px; color: #ccc; font-weight: 700; margin-top: 3px; }
  .lib-tags { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .lib-tag { padding: 10px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .lib-tag.amber { background: #fffbeb; color: #92400e; }
  .lib-tag.indigo { background: #eef2ff; color: #3730a3; }
  .lib-meta { font-size: 10px; color: #bbb; margin-top: 8px; }

  /* Toast */
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #1c1c1e; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .mt12 { margin-top: 12px; }
  .mt8  { margin-top: 8px; }
  .empty { text-align: center; padding: 48px 0; color: #ccc; }
  .empty p:first-child { font-size: 14px; font-weight: 700; }
  .empty p:last-child  { font-size: 11px; margin-top: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>錢錢顯化庫 🐼</h1>
  <p>DAILY ENERGY MAPPING</p>
</div>

<div class="toast" id="toast"></div>

<!-- 今日記錄 -->
<div class="page" id="page-today">
  <div class="card">
    <input type="date" id="inp-date" />

    <div class="row mt12">
      <div class="col">
        <span class="label amber">晨間錢錢 🐼</span>
        <span class="sublabel">熊貓之道・大牌 only</span>
        <select id="sel-morning" onchange="onMorningChange()">
          <option value="">選擇牌名</option>
        </select>
      </div>
      <div class="col">
        <span class="label indigo">睡前典典 🌙</span>
        <span class="sublabel">偉特牌・整副 78 張</span>
        <select id="sel-night">
          <option value="">選擇牌名</option>
        </select>
      </div>
    </div>

    <div id="energy-wrap" class="mt12" style="display:none">
      <div class="energy-card">
        <div class="energy-title">✦ 今日龍龜・自動連動</div>
        <div class="energy-row">🐢 龍龜夥伴：<span class="amber" id="e-turtle"></span></div>
        <div class="energy-row">📿 建議手串：<span class="indigo" id="e-bracelet"></span></div>
        <div class="energy-meta" id="e-meta"></div>
      </div>
    </div>

    <div class="mt12">
      <span class="label" style="color:#888">今日事件</span>
      <textarea id="inp-event" placeholder="今天發生了什麼？紀錄大小事、情緒、轉折…"></textarea>
    </div>

    <div class="mt12">
      <span class="label" style="color:#888">解析備註 <span style="font-weight:400;color:#bbb;font-size:9px;letter-spacing:0">（從對話貼入）</span></span>
      <textarea id="inp-analysis" placeholder="把 Claude 的解析貼在這裡…" style="min-height:90px"></textarea>
    </div>

    <div class="btn-row mt12">
      <button class="btn-note" onclick="saveRecord()">💾 儲存紀錄</button>
      <button class="btn-save" onclick="saveRecord()" title="儲存">✓</button>
    </div>
  </div>
</div>

<!-- 月曆 -->
<div class="page active" id="page-calendar">
  <div class="card">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-dow"></div>
    <div class="cal-grid mt8" id="cal-days"></div>
  </div>

  <div class="stats-card" id="stats-wrap" style="display:none">
    <div class="stats-title">▪ 晨間大牌出現率</div>
    <div id="stats-bars"></div>
    <div class="stats-meta" id="stats-meta"></div>
  </div>

  <div class="empty" id="cal-empty">
    <p>還沒有紀錄</p>
    <p>點下方 ＋ 開始今天的記錄</p>
  </div>
</div>

<!-- 牌義庫 -->
<div class="page" id="page-lib">
  <div class="lib-banner">
    <p>🐼 晨間錢錢｜熊貓之道塔羅</p>
    <p>大阿爾克那 22 張 · 家中抽大牌 · 三個月進步後才抽整副</p>
  </div>
  <div id="lib-list"></div>
</div>

<!-- Nav -->
<nav class="nav">
  <button class="nav-btn active" id="nav-calendar" onclick="goPage('calendar')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </button>
  <button class="nav-add" onclick="newEntry()">＋</button>
  <button class="nav-btn" id="nav-lib" onclick="goPage('lib')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
  </button>
</nav>

<script>
// ── 資料庫 ──────────────────────────────────────────────────
const DATA = {
  "0":  { name:"愚人",     zodiac:"天王星", beast:"飛鳥",        turtle:"汽水糖 (方解石)",     bracelet:"藍色系手串",        time:"黎明/突發",    element:"風" },
  "1":  { name:"魔術師",   zodiac:"水星",   beast:"變色龍",      turtle:"麥芽糖 (老礦髮晶)",   bracelet:"金髮晶 / 黃水晶",   time:"週三/清晨",    element:"風" },
  "2":  { name:"女教皇",   zodiac:"月亮",   beast:"白鴞",        turtle:"汽水糖 (方解石)",     bracelet:"小藍球 / 海藍寶",   time:"週一/深夜",    element:"水" },
  "3":  { name:"皇后",     zodiac:"金星",   beast:"大地母神",    turtle:"焦糖 (黃膠花小樹)",   bracelet:"金魚膠花 (必戴)",   time:"週五/春季",    element:"土" },
  "4":  { name:"皇帝",     zodiac:"牡羊座", beast:"公羊/麒麟",   turtle:"焦糖 (黃膠花小樹)",   bracelet:"黑曜石 (必戴)",     time:"正午",         element:"火" },
  "5":  { name:"教皇",     zodiac:"金牛座", beast:"靈象",        turtle:"沙士糖 (藍磷灰)",     bracelet:"金髮晶",            time:"長期累積",     element:"土" },
  "6":  { name:"戀人",     zodiac:"雙子座", beast:"雙生蝶",      turtle:"軟糖 (螢石)",         bracelet:"多彩螢石",          time:"短暫交會",     element:"風" },
  "7":  { name:"戰車",     zodiac:"巨蟹座", beast:"靈龜",        turtle:"麥芽糖 或 焦糖",      bracelet:"黑曜石 (必戴)",     time:"清晨/夏至",    element:"水" },
  "8":  { name:"力量",     zodiac:"獅子座", beast:"雄獅",        turtle:"麥芽糖",              bracelet:"黑曜石 (必戴)",     time:"盛夏/正午",    element:"火" },
  "9":  { name:"隱士",     zodiac:"處女座", beast:"隱狐",        turtle:"星空糖 (拉長石)",     bracelet:"煙晶柱 / 拉長石",   time:"黃昏/入秋",    element:"土" },
  "10": { name:"命運之輪", zodiac:"木星",   beast:"銜尾蛇",      turtle:"沙士糖 (藍磷灰)",     bracelet:"彩色手串",          time:"週四/交替",    element:"火" },
  "11": { name:"正義",     zodiac:"天秤座", beast:"白鶴",        turtle:"沙士糖",              bracelet:"黑曜石",            time:"秋分",         element:"風" },
  "12": { name:"吊人",     zodiac:"海王星", beast:"深海生物",    turtle:"星空糖",              bracelet:"拉長石",            time:"三週到三個月", element:"水" },
  "13": { name:"死亡",     zodiac:"天蠍座", beast:"鳳凰",        turtle:"星空糖",              bracelet:"黑曜石",            time:"深夜/轉化",    element:"水" },
  "14": { name:"節制",     zodiac:"射手座", beast:"獨角獸",      turtle:"青嵐 (藍絨晶)",       bracelet:"多彩螢石",          time:"晨昏交替",     element:"火" },
  "15": { name:"惡魔",     zodiac:"摩羯座", beast:"山羊/暗影獸", turtle:"黑曜岩原礦",          bracelet:"黑曜石 (必戴)",     time:"冬至/深夜",    element:"土" },
  "16": { name:"高塔",     zodiac:"火星",   beast:"雷龍",        turtle:"星空糖 / 黑曜岩",     bracelet:"黑曜石 (必戴)",     time:"週二/突發",    element:"火" },
  "17": { name:"星星",     zodiac:"水瓶座", beast:"青鳥",        turtle:"青嵐 (藍絨晶)",       bracelet:"海藍寶 / 天河石",   time:"雨過天晴",     element:"風" },
  "18": { name:"月亮",     zodiac:"雙魚座", beast:"錦鯉",        turtle:"青嵐 / 汽水糖",       bracelet:"小藍球 / 海藍寶",   time:"潮汐漲落",     element:"水" },
  "19": { name:"太陽",     zodiac:"太陽",   beast:"金烏",        turtle:"焦糖 (黃膠花小樹)",   bracelet:"金魚膠花 (必戴)",   time:"最光明時刻",   element:"火" },
  "20": { name:"審判",     zodiac:"冥王星", beast:"白澤",        turtle:"星空糖",              bracelet:"黑曜石",            time:"重要節點",     element:"火" },
  "21": { name:"世界",     zodiac:"土星",   beast:"玄武",        turtle:"沙士糖 (藍磷灰)",     bracelet:"大藍力士 / 藍虎眼", time:"週六/圓滿",    element:"土" },
};
const MAJOR = Object.values(DATA).map(d => d.name);
const SUITS = ["權杖","聖杯","寶劍","星幣"];
const RANKS = ["王牌","二","三","四","五","六","七","八","九","十","侍者","騎士","皇后","國王"];
const MINOR = SUITS.flatMap(s => RANKS.map(r => s+r));
const ALL   = [...MAJOR, ...MINOR];

// ── 狀態 ────────────────────────────────────────────────────
let records   = [];
let calYear   = new Date().getFullYear();
let calMon    = new Date().getMonth(); // 0-indexed
let editingDate = null;

// ── 初始化 ───────────────────────────────────────────────────
function init() {
  // 填選單
  const sm = document.getElementById('sel-morning');
  const sn = document.getElementById('sel-night');
  MAJOR.forEach(n => sm.innerHTML += `<option value="${n}">${n}</option>`);
  ALL.forEach(n   => sn.innerHTML += `<option value="${n}">${n}</option>`);

  // 今日日期
  document.getElementById('inp-date').value = todayStr();

  // 月曆週標題
  const dow = document.getElementById('cal-dow');
  ['日','一','二','三','四','五','六'].forEach(d => {
    dow.innerHTML += `<div class="cal-dow">${d}</div>`;
  });

  // 牌義庫
  const lib = document.getElementById('lib-list');
  Object.entries(DATA).forEach(([id, item]) => {
    lib.innerHTML += `
    <div class="lib-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="lib-id">#${id} MAJOR ARCANA</div>
          <div class="lib-name">${item.name}</div>
        </div>
        <div style="text-align:right">
          <div class="lib-badge">${item.zodiac}</div>
          <div class="lib-element">${item.element}</div>
        </div>
      </div>
      <div class="lib-tags">
        <div class="lib-tag amber">🐢 ${item.turtle}</div>
        <div class="lib-tag indigo">📿 ${item.bracelet}</div>
      </div>
      <div class="lib-meta">🕒 ${item.time}｜神獸：${item.beast}</div>
    </div>`;
  });

  renderCalendar();
}

// ── 工具 ────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── 頁面切換 ─────────────────────────────────────────────────
function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const nb = document.getElementById('nav-'+name);
  if (nb) nb.classList.add('active');
}

function newEntry() {
  editingDate = null;
  document.getElementById('inp-date').value     = todayStr();
  document.getElementById('sel-morning').value  = '';
  document.getElementById('sel-night').value    = '';
  document.getElementById('inp-event').value    = '';
  document.getElementById('inp-analysis').value = '';
  document.getElementById('energy-wrap').style.display = 'none';
  goPage('today');
  // nav 高亮清除（today 沒有 nav button）
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

// ── 晨間牌聯動 ───────────────────────────────────────────────
function onMorningChange() {
  const name = document.getElementById('sel-morning').value;
  const info = Object.values(DATA).find(d => d.name === name);
  const wrap = document.getElementById('energy-wrap');
  if (!info) { wrap.style.display = 'none'; return; }
  document.getElementById('e-turtle').textContent   = info.turtle;
  document.getElementById('e-bracelet').textContent = info.bracelet;
  document.getElementById('e-meta').textContent     = `🕒 ${info.time}　${info.element}元素　${info.zodiac}`;
  wrap.style.display = 'block';
}

// ── 儲存紀錄 ─────────────────────────────────────────────────
function saveRecord() {
  const date = document.getElementById('inp-date').value;
  if (!date) { toast('請選擇日期'); return; }
  const record = {
    date,
    morningCard : document.getElementById('sel-morning').value,
    nightCard   : document.getElementById('sel-night').value,
    event       : document.getElementById('inp-event').value,
    analysis    : document.getElementById('inp-analysis').value,
  };
  records = [record, ...records.filter(r => r.date !== date)];
  renderCalendar();
  toast('✓ 已儲存');
  setTimeout(() => goPage('calendar'), 600);
}

// ── 載入紀錄到今日頁 ─────────────────────────────────────────
function loadRecord(record) {
  editingDate = record.date;
  document.getElementById('inp-date').value     = record.date;
  document.getElementById('sel-morning').value  = record.morningCard;
  document.getElementById('sel-night').value    = record.nightCard;
  document.getElementById('inp-event').value    = record.event;
  document.getElementById('inp-analysis').value = record.analysis;
  onMorningChange();
  goPage('today');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

// ── 月曆 ─────────────────────────────────────────────────────
function changeMonth(dir) {
  calMon += dir;
  if (calMon < 0)  { calMon = 11; calYear--; }
  if (calMon > 11) { calMon = 0;  calYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${calYear} 年 ${calMon+1} 月`;

  const firstDay  = new Date(calYear, calMon, 1).getDay();
  const daysTotal = new Date(calYear, calMon+1, 0).getDate();
  const today     = todayStr();

  let html = '';
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day cal-empty"></div>`;
  for (let i = 1; i <= daysTotal; i++) {
    const ds  = `${calYear}-${String(calMon+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const rec = records.find(r => r.date === ds);
    const isToday = ds === today;
    let cls = 'cal-day';
    if (rec)     cls += ' has-record';
    if (isToday && !rec) cls += ' today-mark';
    const dot  = rec?.analysis ? '<span class="cal-dot"></span>' : '';
    const click = rec ? `onclick="loadRecord(records.find(r=>r.date==='${ds}'))"` : '';
    html += `<button class="${cls}" ${click}>${i}${dot}</button>`;
  }
  document.getElementById('cal-days').innerHTML = html;

  // 統計
  const acc = {};
  records.forEach(r => { if (r.morningCard) acc[r.morningCard] = (acc[r.morningCard]||0)+1; });
  const sorted = Object.entries(acc).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const statsWrap = document.getElementById('stats-wrap');
  const empty     = document.getElementById('cal-empty');

  if (records.length === 0) {
    statsWrap.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  if (sorted.length > 0) {
    statsWrap.style.display = 'block';
    let bars = '';
    sorted.forEach(([name, count]) => {
      const pct = Math.max(8, Math.round((count/records.length)*100));
      bars += `<div class="stat-row">
        <div class="stat-name">${name}</div>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
        <div class="stat-count">${count}</div>
      </div>`;
    });
    document.getElementById('stats-bars').innerHTML = bars;
    document.getElementById('stats-meta').textContent = `共 ${records.length} 筆紀錄`;
  }
}

init();
</script>
</body>
</html>
